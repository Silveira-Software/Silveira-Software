<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Silveira Software — Full Stack, Automação, Fintech, IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#131324"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1200" height="300" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#grid)"/>

    <circle cx="90" cy="270" r="170" fill="#6366f1" opacity="0.28" filter="url(#glow)"/>
    <circle cx="1110" cy="30" r="170" fill="#a855f7" opacity="0.25" filter="url(#glow)"/>

    <text x="70" y="215" font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="150" font-weight="700" fill="#ffffff" opacity="0.05">&lt;/&gt;</text>
    <text x="1020" y="135" font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="130" font-weight="700" fill="#ffffff" opacity="0.05">{ }</text>

    <text x="600" y="128" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="7" fill="url(#brand)">SILVEIRA SOFTWARE</text>

    <text x="600" y="172" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="17" font-weight="600" letter-spacing="5" fill="#8b8ba7">FULL STACK • AUTOMAÇÃO • FINTECH • iGAMING • IA</text>

    <g font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="19">
      <text x="600" y="232" text-anchor="middle">
        <tspan fill="#6366f1">~ $</tspan>
        <tspan fill="#cfcfe2" dx="8">do zero ao scale</tspan>
      </text>
      <rect x="713" y="216" width="10" height="20" fill="#a855f7">
        <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <rect x="0" y="294" width="1200" height="6" fill="url(#brand)"/>
  </g>
</svg>
